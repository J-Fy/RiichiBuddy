<!DOCTYPE html>
<html id="body" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riichi Buddy</title>
    <link rel="icon" href="images/chun.svg"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="script.js" type="module"></script>
</head>
<body>
    <div id="bar">
        <i id="heartIcon" class="fa fa-heart"></i>
        <i id="settingsIcon" class="fa fa-gear"></i>
    </div>
    <dialog class="dialogs" id="support">
        <div class="dialogContent" id="supportContent">
            <h3>Enjoy this project?</h3>
            <p>Help me fund an autotable :)</p>
            <a href="https://paypal.me/JJFunky">
                <div class="donate">
                    <img src="images/PP.svg" width="80%" alt="PayPal logo">
                </div>
            </a>
            <a href="https://venmo.com/code?user_id=3424604714434560145&created=1775287780">
                <div class="donate">
                    <img src="images/V.svg" width="80%" alt="Venmo logo">
                </div>
            </a>
            <button class="dialogX" id="closeSupport">&times;</button>
        </div>
    </dialog> 
    <dialog class="dialogs" id="settings">
        <div class="dialogContent" id="settingsContent">
            <h2>Settings</h2>
            <div class="ranges nonrev" id="hanRange">
                <div>Han range</div>
                <div class="range_container">
                    <input class="setting" id="minHanSlider" type="range" value="0" min="0" max="12"/>
                    <input class="setting" id="maxHanSlider" type="range" value="12" min="0" max="12"/>
                    <div class="minMaxCont">
                        <p class="minMaxLabel" id="minHanLabel">1</p>
                        <p class="minMaxLabel" id="maxHanLabel">13</p>
                    </div>
                </div>
            </div>
            <div class="ranges nonrev" id="fuRange">
                <div>Fu range</div>
                <div class="range_container">
                    <input class="setting" id="minFuSlider" type="range" value="0" min="0" max="10"/>
                    <input class="setting" id="maxFuSlider" type="range" value="10" min="0" max="10"/>
                    <div class="minMaxCont">
                        <p class="minMaxLabel" id="minFuLabel">20</p>
                        <p class="minMaxLabel" id="maxFuLabel">110</p>
                    </div>
                </div>
            </div>
            <div class="ranges nonrev" id="triples">
                <div class="tripleSwitch">
                    <input id="switch-N" name="dealTrip" type="radio" value="N" class="switch-input setting" />
                    <label for="switch-N" class="switch-label switch-label-N">Non-Dealer Only</label>
                    <input id="switch-BD" name="dealTrip" type="radio" value="I" class="switch-input setting" />
                    <label for="switch-BD" class="switch-label switch-label-BD">Both</label>
                    <input id="switch-D" name="dealTrip" type="radio" value="Y" class="switch-input setting" />
                    <label for="switch-D" class="switch-label switch-label-D">Dealer Only</label>
                    <span class="switch-selector"></span>
                </div>
                <div class="tripleSwitch">
                    <input id="switch-R" name="ronTrip" type="radio" value="Y" class="switch-input setting" />
                    <label for="switch-R" class="switch-label switch-labelswitch-R">Ron Only</label>
                    <input id="switch-BR" name="ronTrip" type="radio" value="I" class="switch-input setting" />
                    <label for="switch-BR" class="switch-label switch-label-BR">Both</label>
                    <input id="switch-T" name="ronTrip" type="radio" value="N" class="switch-input setting" />
                    <label for="switch-T" class="switch-label switch-label-T">Tsumo Only</label>
                    <span class="switch-selector"></span>
                </div>
            </div>
            <div id="switches">
                <div>
                    <div class="settingPanel">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-random"/>
                            <span class="slider"></span>
                        </label>
                        <p>Random order</p>
                    </div>
                    <div class="settingPanel nonrev">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-weighted"/>
                            <span class="slider"></span>
                        </label>
                        <p>Weight odds</p> 
                    </div>
                    <div class="settingPanel nonrev">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-autocheck"/>
                            <span class="slider"></span>
                        </label>
                        <p>Autocheck</p>
                    </div>
                    <div class="settingPanel nonrev">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-kiriage"/>
                            <span class="slider"></span>
                        </label>
                        <p>Kiriage</p>
                    </div>
                </div>
                <div>
                    <div class="settingPanel nonrev">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-base"/>
                            <span class="slider"></span>
                        </label>
                        <p>Base points</p>
                    </div>
                    <div class="settingPanel nonrev">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-short"/>
                            <span class="slider"></span>
                        </label>
                        <p>Shorthand</p>
                    </div>
                    <div class="settingPanel nonrev" id="trueRand">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-trueRand"/>
                            <span class="slider"></span>
                        </label>
                        <p>True random</p>
                    </div>
                    <div class="settingPanel">
                        <label class="toggle">
                            <input type="checkbox" class="setting" id="ms-reverse"/>
                            <span class="slider"></span>
                        </label>
                        <p>Reverse mode</p>
                    </div>
                </div>
            </div>
            <button class="dialogX" id="closeSettings">&times;</button>
        </div>
    </dialog>
    <div id="content">
        <div id="hints">
            <div id="hints-cont">
                <div id="hanBox"></div>
                <H2>Han</H2>
                <div id="fuBox"></div>
                <h2 id="fuText">Fu</h2>
            </div>
            <div id="dealrow">
                <div class="flagBox" id="nonFlag"><p>Non-Dealer</p></div>
                <div class="flagBox" id="dealFlag"><p>Dealer</p></div>
            </div>
            <div id="tsumorow">
                <div class="flagBox" id="ronFlag"><p>Ron</p></div>
                <div class="flagBox" id="tsumoFlag"><p>Tsumo</p></div>
            </div>
        </div>
        <div id="score">
            <div class="scoreBtns">
                <div id="box1"></div>
                <h6 id="cap1"></h6>
            </div>
            <div>
                <div id="box2"></div>
                <h6 id="cap2"></h6>
            </div>
        </div>
        <div id="keyboard">
            <div id="keyboard-cont">
                <div class="numpad">
                    <div class="btn-row">
                        <button class="keyboard-button" id="btn1">1</button>
                        <button class="keyboard-button" id="btn2">2</button>
                        <button class="keyboard-button" id="btn3">3</button>
                    </div>
                    <div class="btn-row">
                        <button class="keyboard-button" id="btn4">4</button>
                        <button class="keyboard-button" id="btn5">5</button>
                        <button class="keyboard-button" id="btn6">6</button>
                    </div>
                    <div class="btn-row">
                        <button class="keyboard-button" id="btn7">7</button>
                        <button class="keyboard-button" id="btn8">8</button>
                        <button class="keyboard-button" id="btn9">9</button>
                    </div>
                    <div class="btn-row">
                        <button id="zeroBtn" class="keyboard-button">0</button>
                        <button id="delBtn" class="keyboard-button">del</button>
                    </div>
                </div>
                <div class="enterBtn">
                    <button class="keyboard-button" id="enterBtn">Enter</button>
                </div>
            </div>
        </div>
        <dialog class="dialogs" id="incorrectPopup">
            <p class="dialogHeader">Nope!</p>
            <div class="dialogContainer">
                <div>the correct answer was</div>
                <div id = "correctAns"></div>
            </div>
            <button class="closeBtn" id="closePopup">close</button>
        </dialog>
    </div>

</body>
</html>
